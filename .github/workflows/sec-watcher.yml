name: SEC Watcher

on:
  schedule:
    # Every 15 minutes, weekdays, 12:00-23:00 UTC (8 AM - 7 PM ET)
    # Covers the SEC's 6 AM - 10 PM ET filing acceptance window.
    - cron: '*/15 12-23 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sec-watcher
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run watcher
        env:
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          MAX_ALERTS_PER_RUN: '20'
        run: python3 sec_watcher.py

      - name: Commit state if changed
        run: |
          if [ -n "$(git status --porcelain state.json 2>/dev/null)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update watcher state [skip ci]"
            git push
          fi
